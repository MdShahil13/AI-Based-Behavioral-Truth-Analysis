<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sign Up | Behavioral Truth Analysis</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='signup.css') }}">
</head>
<body>
	<div class="main-container">
		<header>
			<div class="logo">AI<span>Behavioral</span>Analysis</div>
            <div class="status-badge" style="display: flex;">
                <span class="dot" style="background-color: #2196f3; box-shadow: 0 0 10px #2196f3;"></span> REGISTRATION_OPEN
            </div>
		</header>

		<main class="content-area">
            <div class="video-section">
                <div class="video-wrapper signup-terminal" style="max-width: 550px; padding: 50px;">
                    <div class="scan-line"></div>
                    <h2 style="color: var(--primary-neon); text-align: center; margin-bottom: 30px; letter-spacing: 3px; font-size: 1.5rem;">OPERATOR REGISTRATION</h2>
                    
                    {% if error %}
                        <div class="error" style="color: #ff4d4d; text-align: center; margin-bottom: 20px; font-size: 0.9rem; background: rgba(255,0,0,0.1); padding: 10px; border-radius: 4px; border-left: 3px solid #ff4d4d;">
                            {{ error }}
                        </div>
                    {% endif %}

                    <form method="post">
                        <div class="input-field">
                            <label for="username">CREATE_OPERATOR_ID</label>
                            <input type="text" id="username" name="username" required autofocus>
                        </div>
                        <div class="input-field">
                            <label for="password">SET_ACCESS_KEY</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        <button type="submit" class="btn-start" style="width: 100%; margin-top: 10px; letter-spacing: 2px;">REGISTER</button>
                    </form>
                    <p style="margin-top: 20px; color: #b6eada;">Already have an account? <a href="/login" style="color: var(--primary-neon); text-decoration: none; font-weight: bold;">Login here</a></p>
                </div>
            </div>
		</main>

		<footer style="margin-top:40px; color:var(--primary-neon); font-size:0.8em; text-align:center; opacity:0.5; letter-spacing: 2px;">
            &copy; 2026 AUTH_SERVER // SECURE_PORT_80
        </footer>
	</div>
</body>
</html>
