<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Behavioral Analysis - Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="main-container">
        <header>
            <div class="logo">AI<span>Behavioral</span>Analysis</div>
            <div id="statusBadge" class="status-badge" style="display: none;">
                <span class="dot"></span> LIVE SYSTEM
            </div>
        </header>
        
        <main class="content-area">
            <div class="video-section">
                <div class="video-wrapper">
                    <div id="scanLine" class="scan-line" style="display: none;"></div>
                    <div id="placeholder" class="placeholder-box">
                        <div id="loader" class="loader" style="display: none;"></div>
                        <span id="placeholderText">Step 1: Calibrate Voice to Begin</span>
                    </div>
                    <!-- DEPLOYMENT READY: Use Video tag instead of Img tag -->
                    <video id="webcam" autoplay playsinline style="width: 100%; height: auto; display: none; border-radius: 8px; transform: scaleX(-1);"></video>
                    <canvas id="output_canvas" style="display: none;"></canvas>
                </div>

                <div class="controls">
                    <div class="btn-group">
                        <button id="calibrateBtn" class="btn-start" onclick="startCalibration()" style="background-color: #2196F3;">1. Calibrate Voice</button>
                        <button id="startBtn" class="btn-start" onclick="startOneMinuteSession()" style="display: none; background-color: #4CAF50;">2. Start 1-Min Interrogation</button>
                        <button id="stopBtn" class="btn-stop" onclick="stopCamera(false)" style="display: none; background-color: #f44336;">Cancel Session</button>
                        <button id="resetBtn" class="btn-start" onclick="location.reload()" style="display: none; background-color: #757575;">Fresh Restart</button>
                    </div>
                    
                    <div class="telemetry-grid">
                        <div class="data-card"><span class="data-label">Blinks</span><span id="count" class="data-value">0</span></div>
                        <div class="data-card"><span class="data-label">Voice Status</span><span id="voiceResult" class="data-value">Waiting...</span></div>
                        <div class="data-card"><span class="data-label">Timer</span><span id="statusText" class="data-value" style="color: #ffeb3b;">READY</span></div>
                    </div>
                    
                    <div id="finalResults" class="final-results" style="display: none; background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #4CAF50; margin-top: 20px;">
                        <h3 style="color: #4CAF50; margin-top: 0;">Full Session Overview</h3>
                        <div class="result-item"><span class="result-label">Verdict:</span><span id="finalVoiceResult" class="result-value"></span></div>
                        <div class="result-item"><span class="result-label">Average Stress:</span><span id="voiceScore" class="result-value"></span></div>
                        <div class="result-item"><span class="result-label">Total Blink Rate:</span><span id="finalBlinkCount" class="result-value"></span></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        let isAnalysisActive = false;
        let frameInterval = null;
        let blinkInterval = null;

        // --- STEP 1: CALIBRATION ---
        function startCalibration() {
            const statusText = document.getElementById('statusText');
            statusText.innerText = "CALIBRATING...";
            fetch('/calibrate_voice')
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'Voice Calibrated') {
                        statusText.innerText = "READY";
                        document.getElementById('calibrateBtn').style.display = "none";
                        document.getElementById('startBtn').style.display = "inline-block";
                    }
                }).catch(() => alert("Mic Calibration Error"));
        }

        // --- STEP 2: SESSION LOGIC ---
        async function startOneMinuteSession() {
            try {
                // Request Browser Permissions
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                video.srcObject = stream;
                video.style.display = "block";
                document.getElementById('placeholder').style.display = "none";
                document.getElementById('scanLine').style.display = "block";
                document.getElementById('statusBadge').style.display = "flex";
                
                // UI Management
                document.getElementById('startBtn').style.display = "none";
                document.getElementById('stopBtn').style.display = "inline-block";
                
                isAnalysisActive = true;
                fetch('/start_session');

                // Timer Management
                let timeLeft = 60;
                const timerInt = setInterval(() => {
                    timeLeft--;
                    document.getElementById('statusText').innerText = `SESSION: ${timeLeft}s`;
                    if(timeLeft <= 0 || !isAnalysisActive) {
                        clearInterval(timerInt);
                        if(isAnalysisActive) stopCamera(true);
                    }
                }, 1000);

                // Start Background Processing
                frameInterval = setInterval(sendFrameToServer, 200); // 5 FPS for AI processing
                blinkInterval = setInterval(updateBlinkCount, 1000); // UI Refresh
                triggerVoiceInterrogation();

            } catch (err) {
                alert("Permission Denied: Deployed sites require Camera/Mic access.");
            }
        }

        function sendFrameToServer() {
            if (!isAnalysisActive) return;
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const imageData = canvas.toDataURL('image/jpeg', 0.5);

            fetch('/process_frame', {
                method: 'POST',
                body: JSON.stringify({ image: imageData }),
                headers: { 'Content-Type': 'application/json' }
            }).catch(err => console.error("Frame processing error"));
        }

        function updateBlinkCount() {
            if (!isAnalysisActive) return;
            fetch('/blink_count')
                .then(res => res.json())
                .then(data => { document.getElementById('count').textContent = data.count; });
        }

        function triggerVoiceInterrogation() {
            if (!isAnalysisActive) return;
            fetch('/voice_analysis')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('voiceResult').innerText = data.result;
                    if (isAnalysisActive) setTimeout(triggerVoiceInterrogation, 3000);
                });
        }

        // --- STEP 3: FINAL REPORT ---
        function showFinalReport() {
            fetch('/get_session_report')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('finalResults').style.display = "block";
                    const verdictEl = document.getElementById('finalVoiceResult');
                    verdictEl.innerText = data.verdict + " (" + data.lie_probability + ")";
                    
                    // Style by verdict
                    if (data.verdict.includes("TRUTHFUL")) verdictEl.style.color = "#4CAF50";
                    else if (data.verdict.includes("DECEPTIVE")) verdictEl.style.color = "#f44336";
                    
                    document.getElementById('voiceScore').innerText = `Voice Stress: ${data.voice_stress} | Face Tension: ${data.face_tension}`;
                    document.getElementById('finalBlinkCount').innerText = data.blink_rate;
                });
        }

        function stopCamera(showReport) {
            isAnalysisActive = false;
            clearInterval(frameInterval);
            clearInterval(blinkInterval);
            
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            
            video.style.display = "none";
            document.getElementById('placeholder').style.display = "block";
            document.getElementById('statusBadge').style.display = "none";
            document.getElementById('stopBtn').style.display = "none";
            document.getElementById('resetBtn').style.display = "inline-block";
            
            if (showReport) showFinalReport();
            else document.getElementById('statusText').innerText = "CANCELLED";
        }
    </script>
</body>
</html>
