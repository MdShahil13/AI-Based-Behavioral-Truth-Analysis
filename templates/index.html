<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lie Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="main-container">
        <header class="navbar">
            <div class="logo" style="display:flex;align-items:center;gap:10px;">
                <svg width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="14" cy="14" r="13" stroke="#00ff88" stroke-width="2"/><ellipse cx="14" cy="14" rx="7" ry="13" stroke="#00ff88" stroke-width="2"/><circle cx="14" cy="14" r="4" fill="#00ff88"/></svg>
                Lie Detector
            </div>
            <div id="statusBadge" class="status-badge" style="display: none;">
                <span class="dot"></span> LIVE SYSTEM
            </div>
            <div class="user-menu">
                <span style="color:#b6eada;font-size:0.95em;">Welcome, <b>{{ g.get('username', 'User') }}</b></span>
               
            </div>
        </header>

        <main class="content-area">
            <div class="video-section">
                <div class="video-wrapper">
                    <div id="scanLine" class="scan-line" style="display: none;"></div>
                    <div id="placeholder" class="placeholder-box">
                        <div id="loader" class="loader" style="display: none;"></div>
                        <span id="placeholderText">Step 1: <b>Calibrate Voice</b> to Begin <span title="Click the blue button below and speak normally for a few seconds.">🛈</span></span>
                    </div>
                    <img id="videoFeed" src="" alt="Video Stream" style="display: none;">
                </div>

                <div class="controls card">
                    <div class="btn-group">
                        <button id="calibrateBtn" class="btn-start" onclick="startCalibration()" style="background-color: #2196F3;">
                            <span style="vertical-align:middle;display:inline-block;margin-right:6px;">
                                <svg width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="9" cy="9" r="8" stroke="#fff" stroke-width="2"/><path d="M9 5v4l3 2" stroke="#fff" stroke-width="2"/></svg>
                            </span>
                            1. Calibrate (Speak Normally)
                        </button>
                        <button id="startBtn" class="btn-start" onclick="startOneMinuteSession()" style="display: none; background-color: #4CAF50;">
                            <span style="vertical-align:middle;display:inline-block;margin-right:6px;">
                                <svg width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="12" height="12" rx="3" stroke="#fff" stroke-width="2"/></svg>
                            </span>
                            2. Start 1-Min Interrogation
                        </button>
                        <button id="stopBtn" class="btn-stop" onclick="stopCamera(false)" style="display: none;">
                            <span style="vertical-align:middle;display:inline-block;margin-right:6px;">
                                <svg width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="12" height="12" rx="3" stroke="#fff" stroke-width="2"/><line x1="3" y1="3" x2="15" y2="15" stroke="#fff" stroke-width="2"/></svg>
                            </span>
                            Cancel Session
                        </button>
                        <button id="resetBtn" class="btn-start" onclick="location.reload()" style="display: none; background-color: #f44336;">
                            <span style="vertical-align:middle;display:inline-block;margin-right:6px;">
                                <svg width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 2v2M9 14v2M2 9h2m10 0h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 13.78l1.42-1.42M14.36 3.64l1.42-1.42" stroke="#fff" stroke-width="2"/></svg>
                            </span>
                            Fresh Restart
                        </button>
                    </div>

                    <div class="telemetry-grid">
                        <div class="data-card">
                            <span class="data-label">Blinks <span title="Number of eye blinks detected.">👁️</span></span>
                            <span id="count" class="data-value">0</span>
                        </div>
                        <div class="data-card">
                            <span class="data-label">Current Status <span title="Voice analysis result.">🎤</span></span>
                            <span id="voiceResult" class="data-value">Waiting...</span>
                        </div>
                        <div class="data-card">
                            <span class="data-label">Timer <span title="Session timer.">⏱️</span></span>
                            <span id="statusText" class="data-value" style="color: #ffeb3b;">READY</span>
                        </div>
                    </div>

                    <div id="finalResults" class="final-results card" style="display: none;">
                        <h3>Full Session Overview</h3>
                        <div class="result-item">
                            <span class="result-label">Overall Verdict:</span>
                            <span id="finalVoiceResult" class="result-value" style="font-weight: bold; font-size: 1.2rem;"></span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Average Stress:</span>
                            <span id="voiceScore" class="result-value"></span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Total Blink Rate:</span>
                            <span id="finalBlinkCount" class="result-value"></span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer style="margin-top:40px; color:var(--primary-neon); font-size:0.85em; text-align:center; opacity:0.7; letter-spacing: 2px;">
            &copy; 2026 Lie Detector | <a href="/" style="color:var(--primary-neon);text-decoration:underline;">Home</a> | <a href="/logout" style="color:#ff4444;text-decoration:underline;">Logout</a>
        </footer>
    </div>
  <script>
    let updateInterval = null;
    let isAnalysisActive = false;

    // --- STEP 1: CALIBRATION ---
    function startCalibration() {
        const statusText = document.getElementById('statusText');
        const calibrateBtn = document.getElementById('calibrateBtn');
        const startBtn = document.getElementById('startBtn');

        statusText.innerText = "CALIBRATING...";
        calibrateBtn.disabled = true;
        
        fetch('/calibrate_voice')
            .then(response => response.json())
            .then(data => {
                if (data.status === 'Voice Calibrated') {
                    statusText.innerText = "CALIBRATED";
                    calibrateBtn.style.display = "none";
                    startBtn.style.display = "inline-block";
                    alert("System Ready. Click Start for the 1-minute session.");
                }
            }).catch(err => alert("Calibration Error"));
    }

    // --- STEP 2: START 1-MINUTE SESSION ---
    function startOneMinuteSession() {
        // Start the camera and background recording
        startCamera(); 
        fetch('/start_session'); 
        
        let timeLeft = 60;
        const timerDisplay = document.getElementById('statusText');
        const stopBtn = document.getElementById('stopBtn');
        
        const countdown = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = `SESSION ACTIVE: ${timeLeft}s`;
            
            if (timeLeft <= 0 || !isAnalysisActive) {
                clearInterval(countdown);
                if (isAnalysisActive) stopCamera(true); // stop and show report
            }
        }, 1000);
    }

    function startCamera() {
        const videoImg = document.getElementById('videoFeed');
        const statusBadge = document.getElementById('statusBadge');
        const stopBtn = document.getElementById('stopBtn');
        const startBtn = document.getElementById('startBtn');

        videoImg.onload = () => {
            document.getElementById('placeholder').style.display = "none";
            videoImg.style.display = "block";
            document.getElementById('scanLine').style.display = "block";
            updateInterval = setInterval(updateBlinkCount, 1000);
        };
        
        videoImg.src = "{{ url_for('video') }}";
        statusBadge.style.display = "flex";
        startBtn.style.display = "none";
        stopBtn.style.display = "inline-block";
        isAnalysisActive = true;
        
        // Start recurring voice checks during the minute
        triggerVoiceInterrogation();
    }

    function triggerVoiceInterrogation() {
        if (!isAnalysisActive) return;
        fetch('/voice_analysis')
            .then(res => res.json())
            .then(data => {
                document.getElementById('voiceResult').innerText = data.result;
                if (isAnalysisActive) setTimeout(triggerVoiceInterrogation, 3000);
            });
    }

    // --- STEP 3: FINAL REPORT ---
        // --- STEP 3: FINAL REPORT (Updated for 33.33% Model) ---
    function showFinalReport() {
        fetch('/get_session_report') 
            .then(res => res.json())
            .then(data => {
                // Show the hidden results box
                document.getElementById('finalResults').style.display = "block";
                
                // 1. Set the Verdict and Probability Percentage
                document.getElementById('finalVoiceResult').innerText = data.verdict + " (" + data.lie_probability + ")";
                
                // 2. Combine Voice and Face stats into the 'Average Stress' line
                document.getElementById('voiceScore').innerText = "Voice Stress: " + data.voice_stress + " | Facial Tension: " + data.face_tension;
                
                // 3. Set the Blink Rate
                document.getElementById('finalBlinkCount').innerText = data.blink_rate;
                
                // Color coding the verdict text
                const verdictEl = document.getElementById('finalVoiceResult');
                if (data.verdict.includes("TRUTHFUL")) {
                    verdictEl.style.color = "#4CAF50"; // Green
                } else if (data.verdict.includes("DECEPTIVE")) {
                    verdictEl.style.color = "#f44336"; // Red
                } else {
                    verdictEl.style.color = "#ffeb3b"; // Yellow
                }
                
                alert("Session Analysis Complete!\nVerdict: " + data.verdict);
            })
            .catch(err => console.error("Error fetching report:", err));
    }

    function updateBlinkCount() {
        fetch('/blink_count').then(res => res.json()).then(data => {
            document.getElementById('count').textContent = data.count;
        });
    }

    function stopCamera(showReport = false) {
        isAnalysisActive = false;
        clearInterval(updateInterval);
        document.getElementById('videoFeed').style.display = "none";
        document.getElementById('placeholder').style.display = "block";
        document.getElementById('stopBtn').style.display = "none";
        document.getElementById('resetBtn').style.display = "inline-block";
        
        if (showReport) showFinalReport();
    }
</script>
</body>
</html>
