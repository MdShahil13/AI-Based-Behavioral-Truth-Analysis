[phases.setup]
# System dependencies for OpenCV + MediaPipe + Librosa
nixPkgs = [
  "mesa-libGL",   # correct libGL package
  "glib",
  "libstdc++",
  "zlib",
  "ffmpeg"        # needed for audio processing (librosa)
]

[phases.install]
# Install Python dependencies
cmds = ["pip install --no-cache-dir -r requirements.txt"]

[phases.start]
# Start Flask app on Railway using Gunicorn
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT"